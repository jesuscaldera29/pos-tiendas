<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Tienda - Punto de Venta</title>
  <meta name="description" content="Sistema de Punto de Venta para tienda de abarrotes">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">🏪</div>
      <span class="brand" id="business-name">Mi Tienda</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-section="pos" onclick="App.navigate('pos')">
        <span class="nav-icon">🛒</span><span class="nav-label">Punto de Venta</span>
      </div>
      <div class="nav-item" data-section="inventory" onclick="App.navigate('inventory')">
        <span class="nav-icon">📦</span><span class="nav-label">Inventario</span>
      </div>
      <div class="nav-item" data-section="customers" onclick="App.navigate('customers')">
        <span class="nav-icon">👥</span><span class="nav-label">Clientes / Fiado</span>
      </div>
      <div class="nav-item" data-section="cashbox" onclick="App.navigate('cashbox')">
        <span class="nav-icon">💰</span><span class="nav-label">Caja</span>
      </div>
      <div class="nav-item" data-section="expenses" onclick="App.navigate('expenses')">
        <span class="nav-icon">💸</span><span class="nav-label">Gastos</span>
      </div>
      <div class="nav-item" data-section="reports" onclick="App.navigate('reports')">
        <span class="nav-icon">📊</span><span class="nav-label">Reportes</span>
      </div>
      <div class="nav-item" data-section="settings" onclick="App.navigate('settings')">
        <span class="nav-icon">⚙️</span><span class="nav-label">Configuración</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="App.logout()">
        <span class="nav-icon">🚪</span><span class="nav-label">Cerrar Sesión</span>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-sidebar" onclick="App.toggleSidebar()">☰</button>
        <h2 id="section-title">Punto de Venta</h2>
      </div>
      <div class="topbar-right">
        <span id="current-date" style="color:var(--text-secondary);font-size:0.85rem;"></span>
      </div>
    </div>

    <!-- SECTIONS -->
    <div id="section-pos" class="section active"></div>
    <div id="section-inventory" class="section"></div>
    <div id="section-customers" class="section"></div>
    <div id="section-cashbox" class="section"></div>
    <div id="section-expenses" class="section"></div>
    <div id="section-reports" class="section"></div>
    <div id="section-settings" class="section"></div>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <!-- TICKET PRINT AREA -->
  <div id="ticket-print" class="ticket-print hidden"></div>

  <!-- LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <!-- APP MODULES -->
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/pos.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/cashbox.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
